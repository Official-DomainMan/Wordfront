[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare yarn@1.22.22 --activate",
  "yarn --cwd client install --network-timeout 600000",
  "yarn --cwd server install --network-timeout 600000"
]

[phases.build]
cmds = ["yarn --cwd client build"]

[start]
cmd = "yarn --cwd server start"
